<head>

<title>Ciclo II — Asistencia Jornaleros</title>
<!--
  ============================================================
  Santa Faz — RRHH Ciclo II (Asistencia Jornaleros)
  Repo: librillos-ciclo-ii/LOTES-Y-RECEPCION
  ============================================================

  v1.0  2026-04-09  Versión inicial
    - Formulario de asistencia diaria para jornaleros fijos
    - Selector de fecha (default: hoy)
    - Lista de empleados desde solapa EMPLEADOS_JORNAL (filtrada
      por Activo=SI y Planta=CICLO II)
    - Separados visualmente por Company (MT / ATG)
    - Checkboxes: Presente / Ausente (mutuamente excluyentes)
    - Checkbox "Seleccionar todos presentes"
    - Si Ausente: checkbox "Certificado médico" (sí/no)
    - Si Presente: campo "Horas extras" (opcional, decimal)
    - Cálculo automático del importe por empleado:
      Importe = Jornal (si presente) + HE × Valor_Hora_Extra
    - Guarda en solapa CICLOII con ID = Legajo||Fecha||Company
    - Sobreescribe si ya existe (mismo ID)
    - Muestra totales por company y total general al final

  v1.1  2026-04-10  Vista unificada por persona
    - Un empleado = una fila, independiente de en cuántas companies
      tenga contrato. El split MT/ATG se maneja en el backend.
    - Al cargar EMPLEADOS_JORNAL se agrupa por nombre y se arma un
      array `contratos` con las tarifas de cada company
    - El jornal y valor HE mostrados son la SUMA de todos los
      contratos del empleado (lo que la persona cobra en total)
    - Al guardar, se emiten internamente N registros (uno por cada
      contrato/company) con ID Legajo||Fecha||Company preservando
      la estructura de la solapa CICLOII sin cambios
    - Checkbox "Todos presentes" único (global, no por company)
    - Al restaurar el estado de un día ya cargado, toma como
      referencia el estado del primer contrato encontrado (se asume
      que todos los contratos de la misma persona comparten estado)

  v1.2  2026-04-10  Guardado paralelo + reload post-save
    - Guardado paralelo con Promise.all() en vez de loop
      secuencial. Antes enviaba los registros uno por uno
      esperando cada respuesta, ahora los manda todos a la
      vez. Reduce significativamente el tiempo de guardado.
    - Tras guardar exitosamente, recarga la página completa
      (location.reload) para dejar el formulario limpio y
      listo para cargar otra fecha.
    - Removido el link "Volver a Lotes y Recepción" (era
      circular, apuntaba a una URL distinta).

  v1.3  2026-04-10  Multi-planta + FIJO_QUINCENAL + postBatch
    - Nuevo dropdown de Planta al inicio del form. Se carga
      con las plantas distintas encontradas en EMPLEADOS_JORNAL
      (CICLO II, DELTA, ALBA, RECREO, CCP).
    - Título cambiado a "RRHH — Asistencia Jornaleros" ya que
      el form ahora cubre todas las plantas, no solo Ciclo II.
    - Los empleados se filtran dinámicamente al seleccionar
      planta. Cada planta tiene su propio listado.
    - Nuevo tipo de pago FIJO_QUINCENAL para ALBA: los empleados
      cobran un monto fijo por quincena ($250k MT / $500k ATG),
      no un jornal diario. El sistema prorratea dividiendo el
      monto quincenal por DIAS_HABILES_QUINCENA (13 por defecto).
    - El campo de Horas Extras solo se muestra para empleados
      que tengan valor_hora_extra > 0 (en la práctica, solo
      Ciclo II). Para las demás plantas el input ni aparece.
    - Badge "Prorrateo quincenal" en la meta-info de empleados
      ALBA para que el supervisor sepa que es un pago especial.
    - Guardado con postBatch() en una sola llamada al Apps
      Script usando actionPostBatch (Code.gs v1.6). Mucho más
      rápido que Promise.all con N requests separados.
    - Solapa destino cambió de CICLOII a ASISTENCIA (renombrada
      en Code.gs v1.7, con migración automática).
    - Nuevo formato de ID: Legajo||Fecha||Company||Planta
      (permite que el mismo legajo en distintas plantas no se
      pise entre sí).
    - Nuevas columnas en la fila guardada: Planta y Tipo_Pago
      (replicados del maestro para auditoría).

  v1.4  2026-04-10  Prorrateo FIJO_QUINCENAL dinámico por almanaque
    - Reemplazada la constante DIAS_HABILES_QUINCENA por la
      función diasHabilesQuincena(fechaISO) que calcula los
      días hábiles reales (lunes a viernes) de la quincena que
      contiene esa fecha, mirando el almanaque real.
    - Para Q1 cuenta lunes-viernes del día 1 al 15.
    - Para Q2 cuenta lunes-viernes del 16 al último día del mes.
    - buildEmpleadosDePlanta() ahora recibe la fecha como
      parámetro y calcula el prorrateo diario según el mes/año.
    - El event handler de fecha rebuildea la lista de empleados
      si hay planta seleccionada (porque el prorrateo cambia).
    - La nota de "Prorrateo quincenal" ahora muestra el divisor
      real: "Prorrateo quincenal (÷11 días)" o lo que aplique.
    - No contempla feriados nacionales (se descuentan manualmente
      si fuera necesario).

  v1.5  2026-04-10  Fix crash en plantas sin HE (DELTA/ALBA/CCP/RECREO)
    - setStatusSilent() fallaba con "Cannot read properties of null"
      al clickear PRES o AUS en empleados sin campo de Horas
      Extras (todas las plantas excepto Ciclo II).
    - Causa: el div .extras-presente solo se renderiza si el
      empleado tiene permiteHE=true, por lo que querySelector
      devolvía null, y al llamar classList.add/remove crasheaba.
    - Fix: agregados guards "if (extrasP)" e "if (extrasA)"
      antes de cada operación sobre esos elementos.

  ============================================================
-->
<style>

<div class="header">

<div class="container">

    <div class="field">

  </div>

</div>

<script>
// ============================================================
//  CONFIG
// ============================================================
const API = 'https://script.google.com/macros/s/AKfycbzud3BqEJzJPVy4ehTnfOH_m_DfQv05Arx1aEhEgYEUz1V0cKZb0rwSU1ZjR8ZbIECN/exec';

let todosLosEmpleados = [];  // todos los empleados de todas las plantas
let empleados = [];           // filtrados por planta seleccionada
let plantasDisponibles = [];
let registrosDia = {};        // {id: row} registros ya existentes del día+planta

// ============================================================
//  HELPERS
// ============================================================

// Calcula días hábiles reales (lunes-viernes) de la quincena que contiene la fecha.
// Q1: días 1-15, Q2: días 16-fin de mes. Cuenta solo lunes a viernes.
// Nota: no contempla feriados. Si hay que descontarlos, se hace manualmente.
function diasHabilesQuincena(fechaISO) {
  if (!fechaISO) return 10;
  const [y, m, d] = fechaISO.split('-').map(Number);
  const dia = d;
  const ultimoDia = new Date(y, m, 0).getDate();  // último día del mes
  const desde = dia <= 15 ? 1 : 16;
  const hasta = dia <= 15 ? 15 : ultimoDia;

  let count = 0;
  for (let i = desde; i <= hasta; i++) {
    const dow = new Date(y, m - 1, i).getDay();  // 0=dom, 6=sab
    if (dow !== 0 && dow !== 6) count++;
  }
  return count;
}

function fmt(v) {
  if (!v) return '';
  const d = typeof v === 'string' ? v.slice(0,10) : v;
  const [y,m,dd] = d.split('-');
  return `${dd}/${m}/${y}`;
}

function fmtMoney(n) {
  return '$ ' + Math.round(n).toLocaleString('es-AR');
}

function today() {
  const d = new Date();
  return d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
}

function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ============================================================
//  API CALLS
// ============================================================
async function fetchSheet(sheet) {
  const url = API + '?action=get&sheet=' + encodeURIComponent(sheet) + '&_=' + Date.now();
  const r = await fetch(url);
  const j = await r.json();
  if (j.ok) return j.data;
  throw new Error(j.error || 'Error al leer ' + sheet);
}

async function postRow(sheet, row) {
  const data = JSON.stringify({ sheet, row });
  const url = API + '?action=post&data=' + encodeURIComponent(data) + '&_=' + Date.now();
  const r = await fetch(url);
  return await r.json();
}

// v1.3: guardado batch — una sola llamada para N filas, mucho más rápido
async function postBatch(sheet, rows) {
  const data = JSON.stringify({ sheet, rows });
  const url = API + '?action=post_batch&data=' + encodeURIComponent(data) + '&_=' + Date.now();
  const r = await fetch(url);
  return await r.json();
}

// ============================================================
//  INIT (v1.3 — carga todas las plantas)
// ============================================================
async function init() {
  try {
    document.getElementById('fecha').value = today();

    const [empData, asisData] = await Promise.all([
      fetchSheet('EMPLEADOS_JORNAL'),
      fetchSheet('ASISTENCIA')
    ]);

    // Parse EMPLEADOS_JORNAL:
    // [Legajo, Nombre, Planta, Company, Tipo_Pago, Jornal, ValorHE, Activo]
    todosLosEmpleados = empData.slice(1).filter(r => r[1] && String(r[7]||'').toUpperCase() === 'SI')
      .map(r => ({
        legajo: String(r[0]||'').trim(),
        nombre: String(r[1]||'').trim(),
        planta: String(r[2]||'').trim().toUpperCase(),
        company: String(r[3]||'').trim().toUpperCase(),
        tipoPago: String(r[4]||'DIARIO').trim().toUpperCase(),
        jornal: parseFloat(r[5]) || 0,
        valorHE: parseFloat(r[6]) || 0
      }));

    // Lista de plantas únicas para el dropdown
    plantasDisponibles = [...new Set(todosLosEmpleados.map(e => e.planta))].sort();
    const selPlanta = document.getElementById('planta');
    plantasDisponibles.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p;
      opt.textContent = p;
      selPlanta.appendChild(opt);
    });

    // Cache completo de ASISTENCIA para filtrado dinámico por fecha+planta
    todosLosRegistros = asisData.slice(1).filter(r => r[0]);

    document.getElementById('loadingOverlay').classList.add('hidden');
    // No renderizar hasta que el usuario elija planta
    document.getElementById('companiesContainer').innerHTML =
      '<div class="card" style="text-align:center;color:var(--text-muted);padding:30px;">Seleccioná una planta para ver los empleados</div>';
  } catch(e) {
    console.error(e);
    document.getElementById('loadingOverlay').innerHTML =
      '<div style="text-align:center;padding:20px;"><p style="color:#c0392b;font-weight:600;">Error al cargar datos</p><p style="font-size:0.85rem;margin-top:8px;">' +
      e.message + '</p><button onclick="location.reload()" class="btn btn-primary" style="width:auto;margin-top:12px;padding:10px 24px;">Reintentar</button></div>';
  }
}

// Agrupa empleados por nombre para la planta seleccionada
// (ej: Raimondi en CICLO II MT + ATG → 1 fila con 2 contratos)
// v1.4: recibe fecha para calcular prorrateo de FIJO_QUINCENAL según
// los días hábiles reales de la quincena que contiene esa fecha.
function buildEmpleadosDePlanta(planta, fecha) {
  const rawRows = todosLosEmpleados.filter(e => e.planta === planta);
  const mapPorNombre = {};
  rawRows.forEach(e => {
    const key = e.nombre.toUpperCase();
    if (!mapPorNombre[key]) {
      mapPorNombre[key] = {
        nombre: e.nombre,
        planta: e.planta,
        contratos: []
      };
    }
    mapPorNombre[key].contratos.push({
      legajo: e.legajo,
      company: e.company,
      tipoPago: e.tipoPago,
      jornal: e.jornal,
      valorHE: e.valorHE
    });
  });

  const lista = Object.values(mapPorNombre).map(emp => {
    // v1.4: cálculo de valor diario basado en la fecha (no constante)
    // Para FIJO_QUINCENAL, el valor "por día" es monto_quincenal / días_hábiles_reales
    const dh = diasHabilesQuincena(fecha);
    emp.jornalTotalDiario = emp.contratos.reduce((s, c) => {
      return s + (c.tipoPago === 'FIJO_QUINCENAL' ? c.jornal / dh : c.jornal);
    }, 0);
    emp.valorHETotal = emp.contratos.reduce((s, c) => s + c.valorHE, 0);
    emp.permiteHE = emp.contratos.some(c => c.valorHE > 0);
    emp.esFijoQuincenal = emp.contratos.every(c => c.tipoPago === 'FIJO_QUINCENAL');
    emp.diasHabilesRef = dh;  // para mostrar en la UI
    emp.key = emp.nombre.toUpperCase().replace(/[^A-Z0-9]/g, '_');
    return emp;
  });
  lista.sort((a, b) => a.nombre.localeCompare(b.nombre));
  return lista;
}

// Full ASISTENCIA data cache - all rows, filtered by fecha+planta
let todosLosRegistros = [];

function filterByDateAndPlanta() {
  const fecha = document.getElementById('fecha').value;
  const planta = document.getElementById('planta').value;
  registrosDia = {};
  todosLosRegistros.forEach(r => {
    const rfecha = String(r[1]||'').slice(0,10);
    const rplanta = String(r[4]||'').trim().toUpperCase();  // col E = Planta
    if (rfecha === fecha && rplanta === planta) {
      registrosDia[String(r[0])] = r;
    }
  });
}

// ============================================================
//  RENDER (v1.1 — vista unificada, 1 fila por persona)
// ============================================================
function render() {
  const container = document.getElementById('companiesContainer');
  container.innerHTML = '';

  // Una sola card con todos los empleados
  const section = document.createElement('div');
  section.className = 'card';

  const header = document.createElement('div');
  header.className = 'company-header unified';
  header.innerHTML = `<span>Empleados jornaleros</span>`;
  const selAllLabel = document.createElement('label');
  selAllLabel.className = 'select-all';
  selAllLabel.innerHTML = `<input type="checkbox" id="selAll" onchange="toggleAll(this.checked)"> Todos presentes`;
  header.appendChild(selAllLabel);
  section.appendChild(header);

  empleados.forEach(emp => {
    // Check si hay algún registro ya cargado (por cualquiera de sus contratos)
    const fecha = document.getElementById('fecha').value;
    const existings = emp.contratos.map(c => {
      const id = c.legajo + '||' + fecha + '||' + c.company + '||' + emp.planta;
      return registrosDia[id];
    });
    const hayCargado = existings.some(e => e);

    const row = document.createElement('div');
    row.className = 'employee-row';
    row.id = 'row_' + emp.key;
    row.dataset.key = emp.key;

    // UI: mostramos el jornal DIARIO total (para FIJO_QUINCENAL es prorrateo)
    const jornalStr = emp.jornalTotalDiario ? fmtMoney(emp.jornalTotalDiario) : 'Sin jornal';
    const heStr = emp.valorHETotal ? fmtMoney(emp.valorHETotal) + '/HE' : '';
    const fijoNote = emp.esFijoQuincenal ? ' · <em style="color:var(--accent)">Prorrateo quincenal (÷' + emp.diasHabilesRef + ' días)</em>' : '';
    const badgeLoaded = hayCargado ? '<span class="badge-loaded">Ya cargado</span>' : '';
    const legajos = [...new Set(emp.contratos.map(c => c.legajo || '—'))].join('/');

    // HE input solo visible si el empleado permite HE (solo Ciclo II actualmente)
    const heFieldHTML = emp.permiteHE ? `
      <div class="extras-item extras-presente hidden">
        <label for="he_${emp.key}">Hs extras:</label>
        <input type="number" id="he_${emp.key}" min="0" step="0.5" value="0" onchange="recalcImporte('${emp.key}')">
      </div>
    ` : '';

    row.innerHTML = `
      <div class="emp-top">
        <div class="emp-info">
          <div class="emp-name">${emp.nombre}${badgeLoaded}</div>
          <div class="emp-meta">Leg ${legajos} · ${jornalStr}${heStr ? ' · ' + heStr : ''}${fijoNote}</div>
        </div>
        <div class="status-toggle">
          <button type="button" class="status-btn btn-p" onclick="setStatus('${emp.key}', 'P')">PRES</button>
          <button type="button" class="status-btn btn-a" onclick="setStatus('${emp.key}', 'A')">AUS</button>
        </div>
      </div>
      <div class="emp-extras">
        ${heFieldHTML}
        <div class="extras-item extras-ausente hidden">
          <input type="checkbox" id="cm_${emp.key}">
          <label for="cm_${emp.key}">Certificado médico</label>
        </div>
        <div class="importe-tag" id="imp_${emp.key}" style="display:none">$ 0</div>
      </div>
    `;

    section.appendChild(row);

    // Restaurar estado si ya hay registros cargados
    const firstExisting = existings.find(e => e);
    if (firstExisting) {
      // Col indexes en ASISTENCIA v1.7:
      // 7=Presente, 8=Ausente, 9=CertMed, 10=HorasExtras
      const presente = String(firstExisting[7]||'').toUpperCase() === 'SI';
      const ausente = String(firstExisting[8]||'').toUpperCase() === 'SI';
      const certMed = String(firstExisting[9]||'').toUpperCase() === 'SI';
      const he = parseFloat(firstExisting[10]) || 0;

      if (presente) {
        setStatusSilent(emp.key, 'P');
        if (emp.permiteHE) {
          const heInput = document.getElementById('he_' + emp.key);
          if (heInput) heInput.value = he;
        }
        recalcImporte(emp.key);
      } else if (ausente) {
        setStatusSilent(emp.key, 'A');
        const cmInput = document.getElementById('cm_' + emp.key);
        if (cmInput) cmInput.checked = certMed;
      }
    }
  });

  container.appendChild(section);
  updateTotales();
}

// ============================================================
//  STATUS TOGGLE
// ============================================================
function setStatus(key, status) {
  setStatusSilent(key, status);
  updateTotales();
  checkSelectAllState();
}

function setStatusSilent(key, status) {
  const row = document.getElementById('row_' + key);
  if (!row) return;

  const btnP = row.querySelector('.btn-p');
  const btnA = row.querySelector('.btn-a');
  const extrasP = row.querySelector('.extras-presente');  // puede ser null si !permiteHE
  const extrasA = row.querySelector('.extras-ausente');
  const impTag = row.querySelector('.importe-tag');

  const isCurrentlyP = row.classList.contains('presente');
  const isCurrentlyA = row.classList.contains('ausente');

  // Toggle off if already active
  if (status === 'P' && isCurrentlyP) {
    row.classList.remove('presente');
    btnP.classList.remove('active-p');
    if (extrasP) extrasP.classList.add('hidden');
    impTag.style.display = 'none';
    return;
  }
  if (status === 'A' && isCurrentlyA) {
    row.classList.remove('ausente');
    btnA.classList.remove('active-a');
    if (extrasA) extrasA.classList.add('hidden');
    impTag.style.display = 'none';
    return;
  }

  // Clear both and apply new
  row.classList.remove('presente', 'ausente');
  btnP.classList.remove('active-p');
  btnA.classList.remove('active-a');
  if (extrasP) extrasP.classList.add('hidden');
  if (extrasA) extrasA.classList.add('hidden');

  if (status === 'P') {
    row.classList.add('presente');
    btnP.classList.add('active-p');
    if (extrasP) extrasP.classList.remove('hidden');
    recalcImporte(key);
  } else if (status === 'A') {
    row.classList.add('ausente');
    btnA.classList.add('active-a');
    if (extrasA) extrasA.classList.remove('hidden');
    impTag.style.display = 'none';
  }
}

function toggleAll(checked) {
  empleados.forEach(emp => {
    const row = document.getElementById('row_' + emp.key);
    if (!row) return;
    const isP = row.classList.contains('presente');
    if (checked && !isP) {
      setStatusSilent(emp.key, 'P');
    } else if (!checked && isP) {
      setStatusSilent(emp.key, 'P'); // toggle off
    }
  });
  updateTotales();
}

function checkSelectAllState() {
  const allP = empleados.every(emp => {
    const row = document.getElementById('row_' + emp.key);
    return row && row.classList.contains('presente');
  });
  const selAll = document.getElementById('selAll');
  if (selAll) selAll.checked = allP;
}

// ============================================================
//  CALC IMPORTE (v1.3 — usa jornalTotalDiario, HE opcional)
// ============================================================
function getHE(key, emp) {
  // HE solo disponible si el empleado tiene valorHE > 0 (solo Ciclo II)
  if (!emp.permiteHE) return 0;
  const inp = document.getElementById('he_' + key);
  return inp ? (parseFloat(inp.value) || 0) : 0;
}

function recalcImporte(key) {
  const emp = empleados.find(e => e.key === key);
  if (!emp) return;
  const row = document.getElementById('row_' + key);
  if (!row || !row.classList.contains('presente')) return;

  const he = getHE(key, emp);
  // jornalTotalDiario ya contempla el prorrateo para FIJO_QUINCENAL
  const total = emp.jornalTotalDiario + (he * emp.valorHETotal);

  const impTag = row.querySelector('.importe-tag');
  impTag.textContent = fmtMoney(total);
  impTag.style.display = 'inline-block';

  updateTotales();
}

function updateTotales() {
  let total = 0, pres = 0, aus = 0;

  empleados.forEach(emp => {
    const row = document.getElementById('row_' + emp.key);
    if (!row) return;
    if (row.classList.contains('presente')) {
      pres++;
      const he = getHE(emp.key, emp);
      total += emp.jornalTotalDiario + (he * emp.valorHETotal);
    } else if (row.classList.contains('ausente')) {
      aus++;
    }
  });

  document.getElementById('totalDia').textContent = fmtMoney(total);
  document.getElementById('totalDetail').textContent = pres + ' presente' + (pres!==1?'s':'') + ' · ' + aus + ' ausente' + (aus!==1?'s':'');
}

// ============================================================
//  GUARDAR (v1.3 — multi-planta, FIJO_QUINCENAL, postBatch, ASISTENCIA)
// ============================================================
async function guardar() {
  const btn = document.getElementById('btnGuardar');
  const fecha = document.getElementById('fecha').value;
  const planta = document.getElementById('planta').value;
  if (!fecha) { showToast('Falta la fecha', 'error'); return; }
  if (!planta) { showToast('Falta seleccionar la planta', 'error'); return; }

  const rowsToSave = [];
  empleados.forEach(emp => {
    const row = document.getElementById('row_' + emp.key);
    if (!row) return;
    const presente = row.classList.contains('presente');
    const ausente = row.classList.contains('ausente');
    if (!presente && !ausente) return;  // sin marcar, saltar

    const he = presente ? getHE(emp.key, emp) : 0;
    const certMed = ausente ? (document.getElementById('cm_' + emp.key)?.checked || false) : false;
    const ua = navigator.userAgent.substring(0, 120);
    const ts = new Date().toISOString();

    // Emitir 1 fila por contrato (una por company)
    const dh = diasHabilesQuincena(fecha);  // v1.4: dinámico según fecha
    emp.contratos.forEach(contrato => {
      // Jornal cobrado: DIARIO usa valor directo; FIJO_QUINCENAL prorratea
      let jornalCobrado = 0;
      if (presente) {
        jornalCobrado = contrato.tipoPago === 'FIJO_QUINCENAL'
          ? contrato.jornal / dh
          : contrato.jornal;
      }
      const importeHE = he * contrato.valorHE;
      const total = jornalCobrado + importeHE;

      // Nuevo formato de ID v1.7: Legajo||Fecha||Company||Planta
      const id = contrato.legajo + '||' + fecha + '||' + contrato.company + '||' + planta;

      // Columnas ASISTENCIA v1.7:
      // [ID, Fecha, Legajo, Nombre, Planta, Company, Tipo_Pago, Presente, Ausente,
      //  Cert_Medico, Horas_Extras, Jornal, Importe_HE, Importe_Total, UA, Timestamp]
      rowsToSave.push([
        id, fecha, contrato.legajo, emp.nombre, planta, contrato.company, contrato.tipoPago,
        presente ? 'SI' : 'NO',
        ausente ? 'SI' : 'NO',
        certMed ? 'SI' : 'NO',
        he, Math.round(jornalCobrado * 100) / 100, Math.round(importeHE * 100) / 100, Math.round(total * 100) / 100,
        ua, ts
      ]);
    });
  });

  if (rowsToSave.length === 0) {
    showToast('Marcá al menos un empleado', 'error');
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Guardando ' + rowsToSave.length + ' registros...';

  try {
    // v1.3: una sola llamada batch al Apps Script (actionPostBatch)
    const resp = await postBatch('ASISTENCIA', rowsToSave);
    if (resp && resp.ok) {
      const updatedStr = resp.updated > 0 ? ' (' + resp.updated + ' actualizado' + (resp.updated !== 1 ? 's' : '') + ')' : '';
      showToast('✓ ' + resp.total + ' registro' + (resp.total !== 1 ? 's' : '') + ' guardados' + updatedStr);
      setTimeout(() => location.reload(), 1200);
    } else {
      throw new Error(resp?.error || 'Error desconocido');
    }
  } catch(e) {
    showToast('Error: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = 'Guardar asistencia del día';
  }
}

// ============================================================
//  EVENT HANDLERS
// ============================================================
document.getElementById('fecha').addEventListener('change', function() {
  // v1.4: al cambiar fecha hay que recalcular el prorrateo de FIJO_QUINCENAL
  // porque los días hábiles de la quincena pueden cambiar
  const planta = document.getElementById('planta').value;
  if (planta) {
    empleados = buildEmpleadosDePlanta(planta, this.value);
  }
  filterByDateAndPlanta();
  if (empleados.length > 0) render();
});

document.getElementById('planta').addEventListener('change', function() {
  const planta = this.value;
  const fecha = document.getElementById('fecha').value;
  if (!planta) {
    empleados = [];
    document.getElementById('companiesContainer').innerHTML =
      '<div class="card" style="text-align:center;color:var(--text-muted);padding:30px;">Seleccioná una planta para ver los empleados</div>';
    updateTotales();
    return;
  }
  empleados = buildEmpleadosDePlanta(planta, fecha);
  filterByDateAndPlanta();
  render();
});

// ============================================================
//  BOOT
// ============================================================
init();
</script>
