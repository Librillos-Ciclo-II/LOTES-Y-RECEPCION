<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Santa Faz — Informes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f2f1ee;--card:#fff;--border:#e4e2dc;--text:#1c1917;--muted:#78716c;--accent:#0c4a6e;
  --green:#16a34a;--green-bg:#f0fdf4;--green-bd:#bbf7d0;
  --amber:#d97706;--amber-bg:#fffbeb;--amber-bd:#fde68a;
  --red:#dc2626;--red-bg:#fef2f2;--red-bd:#fecaca;
  --gray:#6b7280;--gray-bg:#f3f4f6;--gray-bd:#d1d5db;
  --radius:10px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased}
.app{max-width:540px;margin:0 auto;padding:12px 12px 80px}

/* ── Header ── */
.header{padding:16px 0 12px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:700;letter-spacing:-0.3px}
.header .sub{font-size:12px;color:var(--muted);margin-top:1px}
.refresh-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:7px 10px;cursor:pointer;color:var(--muted);font-size:13px;display:flex;align-items:center;gap:5px;transition:all .2s}
.refresh-btn:active{background:var(--gray-bg);transform:scale(.97)}
.refresh-btn svg{transition:transform .6s}
.refresh-btn.loading svg{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── KPIs ── */
.kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;position:relative;overflow:hidden}
.kpi::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:3px 0 0 3px}
.kpi.green::before{background:var(--green)}.kpi.amber::before{background:var(--amber)}
.kpi.blue::before{background:var(--accent)}.kpi.gray::before{background:var(--gray)}
.kpi-val{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;line-height:1.1}
.kpi-lbl{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.5px}
.kpi-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.kpi-sm{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;text-align:center}
.kpi-sm .kpi-val{font-size:16px}
.kpi-sm .kpi-lbl{font-size:10px}

/* ── Filters ── */
.filters{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px}
.filters-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
.filter-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.filter-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
select,input[type=date]{width:100%;font-family:'DM Sans',sans-serif;font-size:14px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text);-webkit-appearance:none;appearance:none}
select:focus,input:focus{outline:none;border-color:var(--accent)}
.chip{padding:7px 0;font-size:12px;font-weight:600;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;text-align:center;transition:all .15s;color:var(--muted)}
.chip.active{border-color:var(--accent);background:#f0f7ff;color:var(--accent)}
.chip:active{transform:scale(.97)}

/* ── Frigorífico groups ── */
.fgo-group{margin-bottom:12px}
.fgo-header{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;transition:background .15s}
.fgo-header:active{background:#fafaf9}
.fgo-name{font-size:15px;font-weight:700;letter-spacing:-0.2px}
.fgo-stats{display:flex;gap:8px;align-items:center;font-size:12px}
.fgo-count{font-family:'JetBrains Mono',monospace;font-weight:500}
.fgo-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:4px;font-weight:600}
.fgo-chevron{transition:transform .25s;color:var(--muted)}
.fgo-header.open .fgo-chevron{transform:rotate(180deg)}
.fgo-body{overflow:hidden;max-height:0;transition:max-height .35s ease}
.fgo-body.open{max-height:9999px}

/* ── Recepción rows ── */
.rec-item{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--gray);margin:6px 0 0 0;border-radius:0 var(--radius) var(--radius) 0;overflow:hidden}
.rec-item.cerrado{border-left-color:var(--green)}
.rec-item.parcial{border-left-color:var(--amber)}
.rec-item.sin-clasificar{border-left-color:var(--gray)}
.rec-head{padding:12px 14px;cursor:pointer;user-select:none}
.rec-head:active{background:#fafaf9}
.rec-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.rec-date{font-size:14px;font-weight:600}
.status-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;text-transform:uppercase;letter-spacing:0.3px}
.st-cerrado{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd)}
.st-parcial{background:var(--amber-bg);color:#92400e;border:1px solid var(--amber-bd)}
.st-sin{background:var(--gray-bg);color:var(--gray);border:1px solid var(--gray-bd)}
.rec-meta{font-size:12px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
.rec-meta strong{color:var(--text)}
.rec-progress{margin:6px 0 2px;height:5px;background:#eee;border-radius:3px;overflow:hidden}
.rec-progress-fill{height:100%;border-radius:3px;transition:width .3s}
.rec-progress-txt{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;margin-top:2px}

/* ── Detalle expandible ── */
.rec-detail{max-height:0;overflow:hidden;transition:max-height .3s ease}
.rec-detail.open{max-height:2000px}
.rec-detail-inner{padding:0 14px 14px;border-top:1px solid var(--border)}
.carga-item{padding:8px 0;border-bottom:1px solid #f5f4f0;font-size:13px}
.carga-item:last-child{border-bottom:none}
.carga-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.carga-num{font-weight:600;font-size:12px;color:var(--accent)}
.carga-fecha{font-size:11px;color:var(--muted)}
.cat-row{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.cat-pill{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;font-family:'JetBrains Mono',monospace}
.cAAA{background:#EEEDFE;color:#3C3489}.cAA{background:#E1F5EE;color:#085041}
.cA{background:#E6F1FB;color:#0C447C}.cB{background:#FAEEDA;color:#633806}
.cC{background:#FAECE7;color:#712B13}.cD{background:#F1EFE8;color:#444441}
.dias-badge{font-size:11px;color:var(--muted);background:var(--gray-bg);padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace}

/* ── Loading / empty ── */
.loading-wrap{text-align:center;padding:40px 20px;color:var(--muted)}
.spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:10px}
.empty{text-align:center;padding:30px;color:var(--muted);font-size:13px}

/* ── Beta banner ── */
.beta-bar{background:var(--accent);color:#fff;text-align:center;padding:6px;font-size:12px;font-weight:600;letter-spacing:1px;position:sticky;top:0;z-index:999}
</style>
</head>
<body>
<div class="beta-bar">INFORMES BETA — solo lectura</div>
<div class="app">

<div class="header">
  <div>
    <h1>Informes</h1>
    <div class="sub">Recepciones y estado de lotes</div>
  </div>
  <button class="refresh-btn" id="btn-refresh" onclick="loadData(true)">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
    <span id="refresh-txt">Actualizar</span>
  </button>
</div>

<!-- KPIs -->
<div class="kpis" id="kpis">
  <div class="kpi green"><div class="kpi-val" id="k-cerrados">—</div><div class="kpi-lbl">Lotes cerrados</div></div>
  <div class="kpi amber"><div class="kpi-val" id="k-parciales">—</div><div class="kpi-lbl">En proceso</div></div>
  <div class="kpi gray"><div class="kpi-val" id="k-sinclasif">—</div><div class="kpi-lbl">Sin clasificar</div></div>
  <div class="kpi blue"><div class="kpi-val" id="k-total">—</div><div class="kpi-lbl">Recepciones</div></div>
</div>
<div class="kpi-row" id="kpis2">
  <div class="kpi-sm"><div class="kpi-val" id="k-unidpend">—</div><div class="kpi-lbl">Un. pendientes</div></div>
  <div class="kpi-sm"><div class="kpi-val" id="k-kgstotal">—</div><div class="kpi-lbl">Kgs salados</div></div>
  <div class="kpi-sm"><div class="kpi-val" id="k-dias">—</div><div class="kpi-lbl">Días prom.</div></div>
</div>

<!-- Filters -->
<div class="filters">
  <div class="filters-title">Filtros</div>
  <div class="filter-row" style="margin-bottom:10px">
    <select id="fl-fgo" onchange="renderAll()">
      <option value="">Todos los frigoríficos</option>
      <option>DELTA</option><option>RECREO</option><option>ALBA</option>
      <option>SANTA INES</option><option>C.PARANA</option><option>SUIPACHA</option>
    </select>
    <select id="fl-orden" onchange="renderAll()">
      <option value="desc">Más recientes</option>
      <option value="asc">Más antiguos</option>
    </select>
  </div>
  <div class="filter-row" style="margin-bottom:10px">
    <input type="date" id="fl-desde" onchange="renderAll()" placeholder="Desde">
    <input type="date" id="fl-hasta" onchange="renderAll()" placeholder="Hasta">
  </div>
  <div class="filter-row3">
    <button class="chip active" id="ch-todos" onclick="setEstado('')">Todos</button>
    <button class="chip" id="ch-cerrado" onclick="setEstado('cerrado')">Cerrados</button>
    <button class="chip" id="ch-parcial" onclick="setEstado('parcial')">Parciales</button>
  </div>
  <div class="filter-row3" style="margin-top:6px">
    <button class="chip" id="ch-sin" onclick="setEstado('sin')">Sin clasif.</button>
    <button class="chip" id="ch-pendiente" onclick="setEstado('pendiente')">Pendientes</button>
    <div></div>
  </div>
</div>

<!-- Content -->
<div id="content">
  <div class="loading-wrap"><div class="spinner"></div><div>Cargando datos...</div></div>
</div>

</div>
<script>
const API = 'https://script.google.com/macros/s/AKfycbzemzflPEpQ96kIzQ33fX74NtDUxtH5wxaBM-ylEdc3SNVxpnOmC_1xz35vcf0tdprl/exec';
const CATS = ['AAA','AA','A','B','C','D'];
const CAT_CLS = {AAA:'cAAA',AA:'cAA',A:'cA',B:'cB',C:'cC',D:'cD'};

let recepciones = [];
let lotes = [];
let filtroEstado = '';

function fmt(v){if(!v)return '';const s=String(v).slice(0,10);const p=s.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:s;}
function num(v){return Number(v)||0;}

// ── Data loading ──
async function loadData(force=false){
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('loading');
  document.getElementById('refresh-txt').textContent = 'Cargando...';

  try {
    // Try get_all first, fallback to individual calls
    let data = null;
    try {
      const r = await fetch(API+'?action=get_all');
      const d = await r.json();
      if(d.ok) data = d;
    } catch(e){}

    if(data) {
      const rr = data.recepciones || [];
      const ll = data.lotes || [];
      recepciones = rr.length && rr[0][0]==='ID' ? rr.slice(1).filter(r=>r[0]) : rr.filter(r=>r[0]);
      lotes = ll.length && ll[0][0]==='ID_Recepcion' ? ll.slice(1).filter(r=>r[0]) : ll.filter(r=>r[0]);
    } else {
      // Fallback individual
      const [r1, r2] = await Promise.all([
        fetch(API+'?action=get&sheet=RECEPCIONES').then(r=>r.json()),
        fetch(API+'?action=get&sheet=LOTES').then(r=>r.json())
      ]);
      const rr = r1.ok ? r1.values : [];
      const ll = r2.ok ? r2.values : [];
      recepciones = rr.slice(1).filter(r=>r[0]);
      lotes = ll.slice(1).filter(r=>r[0]);
    }
    renderAll();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty" style="color:var(--red)">Error de conexión. Verificá tu red e intentá de nuevo.</div>';
  }

  btn.classList.remove('loading');
  document.getElementById('refresh-txt').textContent = 'Actualizar';
}

// ── Build enriched data ──
function buildData(){
  // For each recepción, find its lotes and determine status
  return recepciones.map(r => {
    const id = r[0];
    const fgo = r[1];
    const fecha = String(r[2]).slice(0,10);
    const unid = num(r[3]);
    const kgs = r[4] || '';
    const kg_unid = r[5] || '';
    const tambores = r[6] || '';
    const comentarios = r[7] || '';

    const misLotes = lotes.filter(l => l[0] === id);
    const cerrado = misLotes.some(l => String(l[5])==='1' || l[5]===true || l[5]==='TRUE');
    const tieneCargas = misLotes.length > 0;
    const acum = misLotes.reduce((s,l)=> s + num(l[6]), 0);
    const totalKgs = misLotes.reduce((s,l)=> s + num(l[21]), 0);

    // Status
    let estado = 'sin'; // sin clasificar
    if(cerrado) estado = 'cerrado';
    else if(tieneCargas) estado = 'parcial';

    // Days to close (only for cerrado)
    let dias = null;
    if(cerrado) {
      const fechasCl = misLotes.map(l => String(l[3]).slice(0,10)).filter(f=>f&&f!=='undefined').sort();
      if(fechasCl.length) {
        dias = Math.round((new Date(fechasCl[fechasCl.length-1]) - new Date(fecha)) / (1000*86400));
      }
    }

    // Cargas detail
    const cargas = misLotes.map(l => ({
      numParcial: num(l[4]),
      fechaClasif: String(l[3]).slice(0,10),
      unidCarga: num(l[6]),
      esFinal: String(l[5])==='1' || l[5]===true || l[5]==='TRUE',
      cats: CATS.map((c,i) => ({cat:c, unid:num(l[9+i]), kgs:num(l[15+i])})),
      totalKgs: num(l[21]),
      obs: l[22] || ''
    }));

    return {id, fgo, fecha, unid, kgs, kg_unid, tambores, comentarios, estado, acum, totalKgs, dias, cargas, cerrado};
  });
}

// ── Filters ──
function setEstado(val){
  filtroEstado = val;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  if(val === '') document.getElementById('ch-todos').classList.add('active');
  else if(val === 'cerrado') document.getElementById('ch-cerrado').classList.add('active');
  else if(val === 'parcial') document.getElementById('ch-parcial').classList.add('active');
  else if(val === 'sin') document.getElementById('ch-sin').classList.add('active');
  else if(val === 'pendiente') document.getElementById('ch-pendiente').classList.add('active');
  renderAll();
}

function applyFilters(data){
  let filtered = [...data];
  const fgo = document.getElementById('fl-fgo').value;
  const desde = document.getElementById('fl-desde').value;
  const hasta = document.getElementById('fl-hasta').value;
  const orden = document.getElementById('fl-orden').value;

  if(fgo) filtered = filtered.filter(r => r.fgo === fgo);
  if(desde) filtered = filtered.filter(r => r.fecha >= desde);
  if(hasta) filtered = filtered.filter(r => r.fecha <= hasta);
  if(filtroEstado === 'cerrado') filtered = filtered.filter(r => r.estado === 'cerrado');
  else if(filtroEstado === 'parcial') filtered = filtered.filter(r => r.estado === 'parcial');
  else if(filtroEstado === 'sin') filtered = filtered.filter(r => r.estado === 'sin');
  else if(filtroEstado === 'pendiente') filtered = filtered.filter(r => r.estado !== 'cerrado'); // parcial + sin

  filtered.sort((a,b) => orden==='desc' ? b.fecha.localeCompare(a.fecha) : a.fecha.localeCompare(b.fecha));
  return filtered;
}

// ── KPIs ──
function renderKPIs(allData, filtered){
  const cerrados = allData.filter(r=>r.estado==='cerrado').length;
  const parciales = allData.filter(r=>r.estado==='parcial').length;
  const sinClasif = allData.filter(r=>r.estado==='sin').length;

  document.getElementById('k-cerrados').textContent = cerrados;
  document.getElementById('k-parciales').textContent = parciales;
  document.getElementById('k-sinclasif').textContent = sinClasif;
  document.getElementById('k-total').textContent = allData.length;

  // Unidades pendientes (sin clasificar + faltantes de parciales)
  const pendSin = allData.filter(r=>r.estado==='sin').reduce((s,r)=>s+r.unid,0);
  const pendParc = allData.filter(r=>r.estado==='parcial').reduce((s,r)=>s+Math.max(0, r.unid - r.acum),0);
  document.getElementById('k-unidpend').textContent = (pendSin+pendParc).toLocaleString('es-AR');

  // Kgs totales salados (solo cerrados)
  const kgsTot = allData.filter(r=>r.estado==='cerrado').reduce((s,r)=>s+r.totalKgs,0);
  document.getElementById('k-kgstotal').textContent = kgsTot ? kgsTot.toLocaleString('es-AR',{maximumFractionDigits:0}) : '—';

  // Días promedio de cierre
  const conDias = allData.filter(r=>r.dias!==null && r.dias >= 0);
  const promDias = conDias.length ? (conDias.reduce((s,r)=>s+r.dias,0)/conDias.length).toFixed(1) : '—';
  document.getElementById('k-dias').textContent = promDias;
}

// ── Render ──
function renderAll(){
  const allData = buildData();
  const filtered = applyFilters(allData);
  renderKPIs(allData, filtered);

  const content = document.getElementById('content');
  if(!filtered.length){
    content.innerHTML = '<div class="empty">No hay recepciones con los filtros seleccionados.</div>';
    return;
  }

  // Group by frigorífico
  const groups = {};
  filtered.forEach(r => {
    if(!groups[r.fgo]) groups[r.fgo] = [];
    groups[r.fgo].push(r);
  });

  // Sort fgos by count desc
  const fgos = Object.keys(groups).sort((a,b) => groups[b].length - groups[a].length);

  let html = '';
  fgos.forEach(fgo => {
    const items = groups[fgo];
    const cerr = items.filter(r=>r.estado==='cerrado').length;
    const parc = items.filter(r=>r.estado==='parcial').length;
    const sinc = items.filter(r=>r.estado==='sin').length;

    html += `<div class="fgo-group">
      <div class="fgo-header open" onclick="toggleFgo(this)">
        <div>
          <span class="fgo-name">${fgo}</span>
          <span class="fgo-stats">
            <span class="fgo-count">${items.length} rec.</span>
            ${cerr?'<span class="fgo-badge st-cerrado">'+cerr+' cerr.</span>':''}
            ${parc?'<span class="fgo-badge st-parcial">'+parc+' parc.</span>':''}
            ${sinc?'<span class="fgo-badge st-sin">'+sinc+' pend.</span>':''}
          </span>
        </div>
        <svg class="fgo-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="fgo-body open">
        ${items.map(r => renderRecItem(r)).join('')}
      </div>
    </div>`;
  });

  content.innerHTML = html;
}

function renderRecItem(r){
  const pct = r.unid > 0 ? Math.min(100, Math.round(r.acum / r.unid * 100)) : 0;
  const fillColor = r.estado==='cerrado' ? 'var(--green)' : r.estado==='parcial' ? 'var(--amber)' : 'var(--gray)';
  const stClass = r.estado==='cerrado' ? 'st-cerrado' : r.estado==='parcial' ? 'st-parcial' : 'st-sin';
  const stLabel = r.estado==='cerrado' ? 'Cerrado' : r.estado==='parcial' ? 'Parcial' : 'Sin clasificar';
  const itemClass = r.estado;
  const uid = r.id.replace(/[^a-zA-Z0-9]/g,'_');

  let progressHtml = '';
  if(r.estado !== 'sin'){
    const over = r.acum > r.unid;
    progressHtml = `
      <div class="rec-progress"><div class="rec-progress-fill" style="width:${pct}%;background:${fillColor}${over?' ;background:var(--red)':''}"></div></div>
      <div class="rec-progress-txt"><span>${r.acum} / ${r.unid} un</span><span>${pct}%</span></div>`;
  }

  let metaHtml = `<span>${r.unid} un</span>`;
  if(r.kgs) metaHtml += `<span>${String(r.kgs).replace('.',',')} kg</span>`;
  if(r.tambores) metaHtml += `<span>${r.tambores} tamb.</span>`;
  if(r.dias !== null) metaHtml += `<span class="dias-badge">${r.dias}d</span>`;

  let detailHtml = '';
  if(r.cargas.length){
    detailHtml = r.cargas.map(c => {
      const catPills = c.cats.filter(ct=>ct.unid>0).map(ct =>
        `<span class="cat-pill ${CAT_CLS[ct.cat]}">${ct.cat}: ${ct.unid}un · ${ct.kgs.toFixed(1)}kg</span>`
      ).join('');
      return `<div class="carga-item">
        <div class="carga-head">
          <span class="carga-num">Carga N°${c.numParcial} ${c.esFinal?'(final)':''}</span>
          <span class="carga-fecha">${fmt(c.fechaClasif)} · ${c.unidCarga} un · ${c.totalKgs.toFixed(1)} kg</span>
        </div>
        <div class="cat-row">${catPills}</div>
        ${c.obs ? '<div style="font-size:11px;color:var(--muted);margin-top:3px">'+c.obs+'</div>' : ''}
      </div>`;
    }).join('');

    // Totals across all cargas
    if(r.cargas.length > 1){
      const totByCat = {};
      CATS.forEach(cat => { totByCat[cat] = {unid:0, kgs:0}; });
      r.cargas.forEach(c => c.cats.forEach(ct => { totByCat[ct.cat].unid += ct.unid; totByCat[ct.cat].kgs += ct.kgs; }));
      const totPills = CATS.filter(cat=>totByCat[cat].unid>0).map(cat =>
        `<span class="cat-pill ${CAT_CLS[cat]}">${cat}: ${totByCat[cat].unid}un · ${totByCat[cat].kgs.toFixed(1)}kg</span>`
      ).join('');
      detailHtml += `<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
        <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:4px;text-transform:uppercase">Total acumulado</div>
        <div class="cat-row">${totPills}</div>
      </div>`;
    }
  } else {
    detailHtml = '<div style="padding:12px 0;font-size:13px;color:var(--muted)">Sin cargas registradas aún.</div>';
  }
  if(r.comentarios){
    detailHtml += `<div style="margin-top:6px;font-size:12px;color:var(--muted);padding:6px 8px;background:var(--gray-bg);border-radius:6px">📝 ${r.comentarios}</div>`;
  }

  return `<div class="rec-item ${itemClass}">
    <div class="rec-head" onclick="toggleRec('${uid}')">
      <div class="rec-top">
        <span class="rec-date">${fmt(r.fecha)}</span>
        <span class="status-badge ${stClass}">${stLabel}</span>
      </div>
      <div class="rec-meta">${metaHtml}</div>
      ${progressHtml}
    </div>
    <div class="rec-detail" id="det-${uid}">
      <div class="rec-detail-inner">${detailHtml}</div>
    </div>
  </div>`;
}

// ── Toggle helpers ──
function toggleFgo(el){
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function toggleRec(uid){
  const det = document.getElementById('det-'+uid);
  det.classList.toggle('open');
}

// ── Init ──
loadData();
</script>
</body>
</html>
